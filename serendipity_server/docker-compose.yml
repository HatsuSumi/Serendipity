version: '3.8'

services:
  # PostgreSQL 数据库`r
  postgres:
    image: postgres:15
    container_name: serendipity_postgres
    environment:
      POSTGRES_USER: serendipity
      POSTGRES_PASSWORD: serendipity_dev_password
      POSTGRES_DB: serendipity_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U serendipity']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

