<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>CheckIn Calendar</title>
<style>
  body {
    font-family: sans-serif;
    background: #f5f5f5;
  }

  .calendar {
    width: 320px;
    padding: 16px;
    background: #ffffff;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.1);
  }

  .week-header, .week-row {
    display: flex;
    justify-content: space-around;
  }

  .week-header div {
    width: 32px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: rgba(0,0,0,0.6);
  }

  .day {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border-radius: 50%;
    color: rgba(0,0,0,0.6);
  }

  .checked {
    background: #1976d2;
    color: #ffffff;
    font-weight: bold;
  }

  .empty {
    width: 32px;
    height: 32px;
  }

  .week-row {
    margin-bottom: 8px;
  }

</style>
</head>
<body>

<div class="calendar">
  <div class="week-header">
    <div>日</div><div>一</div><div>二</div>
    <div>三</div><div>四</div><div>五</div><div>六</div>
  </div>

  <div id="calendar-body"></div>
</div>

<script>
  const currentMonth = new Date(); // 当前月份
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth(); // 0-based

  const checkInDates = [
    new Date(year, month, 2),
    new Date(year, month, 5),
    new Date(year, month, 15)
  ];

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  const firstWeekday = firstDay.getDay(); // 0=周日

  const calendarBody = document.getElementById("calendar-body");

  const totalCells = Math.ceil((daysInMonth + firstWeekday) / 7) * 7;

  for (let week = 0; week < totalCells / 7; week++) {
    const row = document.createElement("div");
    row.className = "week-row";

    for (let dayIndex = 0; dayIndex < 7; dayIndex++) {
      const dayNumber = week * 7 + dayIndex - firstWeekday + 1;

      if (dayNumber < 1 || dayNumber > daysInMonth) {
        const empty = document.createElement("div");
        empty.className = "empty";
        row.appendChild(empty);
        continue;
      }

      const dayEl = document.createElement("div");
      dayEl.className = "day";
      dayEl.textContent = dayNumber;

      const isChecked = checkInDates.some(d =>
        d.getFullYear() === year &&
        d.getMonth() === month &&
        d.getDate() === dayNumber
      );

      if (isChecked) {
        dayEl.classList.add("checked");
      }

      row.appendChild(dayEl);
    }

    calendarBody.appendChild(row);
  }
</script>

</body>
</html>
